worker_processes 1;
events { worker_connections 1024; }

http {
    # Pin each room to one backend by hashing the request *path* ($uri excludes the
    # query string, so a room's clients — which differ only by ?clientKey=… — all
    # land on the same instance). This gives OT a single authority per document;
    # Redis Pub/Sub then carries presence/edits to clients on the other instance.
    upstream codenuance {
        hash $uri consistent;
        server app1:8080;
        server app2:8080;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://codenuance;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
