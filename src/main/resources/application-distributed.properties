# --- Distributed profile -----------------------------------------------------
# Activated with SPRING_PROFILES_ACTIVE=distributed (docker-compose sets this).
# Turns CodeNuance into a horizontally scalable deployment:
#   * room snapshots are persisted to PostgreSQL and recovered on restart
#   * ops / selection / presence are fanned out across instances via Redis Pub/Sub
#
# Re-enable the auto-configurations the default profile switched off.
spring.autoconfigure.exclude=

# --- PostgreSQL --------------------------------------------------------------
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/codenuance}
spring.datasource.username=${POSTGRES_USER:codenuance}
spring.datasource.password=${POSTGRES_PASSWORD:codenuance}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- Redis -------------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# --- CodeNuance distributed feature toggles ----------------------------------
codenuance.persistence.enabled=true
codenuance.persistence.snapshot-interval-ms=5000
codenuance.redis.enabled=true
# Channel prefix; the room id is appended so a node only receives rooms it cares about.
codenuance.redis.channel-prefix=codenuance:room:
# A per-process id used to ignore Redis messages this instance published itself.
codenuance.instance-id=${HOSTNAME:${random.uuid}}
