spring.application.name=CodeNuance
server.port=8080

# --- Single-node by default --------------------------------------------------
# Postgres + Redis are only wired in under the "distributed" profile. Their
# auto-configurations are excluded here so `mvnw spring-boot:run` boots with zero
# external services. The distributed profile (application-distributed.properties,
# activated by docker-compose) re-enables them.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Serve the SPA's static assets eagerly.
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

logging.level.com.codenuance=INFO

# --- Code execution (Judge0) ------------------------------------------------
# Defaults to the free public Judge0 CE instance (no key, best-effort uptime).
# To use RapidAPI's Judge0 CE instead, set:
#   judge0.url=https://judge0-ce.p.rapidapi.com
#   judge0.key=YOUR_RAPIDAPI_KEY
#   judge0.host=judge0-ce.p.rapidapi.com
# Or point judge0.url at a self-hosted Judge0 (then no key is needed).
judge0.url=https://ce.judge0.com
judge0.key=
judge0.host=judge0-ce.p.rapidapi.com
