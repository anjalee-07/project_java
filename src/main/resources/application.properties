spring.application.name=CodeNuance
server.port=8080

# Serve the SPA's static assets eagerly.
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

logging.level.com.codenuance=INFO

# --- Code execution (Judge0) ------------------------------------------------
# Defaults to the free public Judge0 CE instance (no key, best-effort uptime).
# To use RapidAPI's Judge0 CE instead, set:
#   judge0.url=https://judge0-ce.p.rapidapi.com
#   judge0.key=YOUR_RAPIDAPI_KEY
#   judge0.host=judge0-ce.p.rapidapi.com
# Or point judge0.url at a self-hosted Judge0 (then no key is needed).
judge0.url=https://ce.judge0.com
judge0.key=
judge0.host=judge0-ce.p.rapidapi.com
