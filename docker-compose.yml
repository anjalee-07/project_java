# Distributed CodeNuance: PostgreSQL (durable snapshots) + Redis (cross-instance
# Pub/Sub) + two app instances behind an nginx load balancer that pins each room
# to one instance (sticky routing), which is what OT needs for a single authority
# per document. Bring it up with:  docker compose up --build
#
# Then open http://localhost:8080 — edits persist across restarts and propagate
# across both instances.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codenuance
      POSTGRES_USER: codenuance
      POSTGRES_PASSWORD: codenuance
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codenuance"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app1:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: distributed
      POSTGRES_URL: jdbc:postgresql://postgres:5432/codenuance
      POSTGRES_USER: codenuance
      POSTGRES_PASSWORD: codenuance
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      HOSTNAME: app1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  app2:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: distributed
      POSTGRES_URL: jdbc:postgresql://postgres:5432/codenuance
      POSTGRES_USER: codenuance
      POSTGRES_PASSWORD: codenuance
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      HOSTNAME: app2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

volumes:
  pgdata:
